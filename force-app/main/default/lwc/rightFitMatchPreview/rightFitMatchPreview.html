<template>
    <div class="slds-box slds-box_x-small slds-m-around_small">
        <template lwc:if={isLoading}>
            <lightning-spinner alternative-text="Checking matches..." size="small"></lightning-spinner>
        </template>
        <template lwc:elseif={error}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <span class="slds-assistive-text">Error</span>
                <h2>{error}</h2>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-p-around_small slds-border_radius-medium {statusClass}">
                <h3 class="slds-text-heading_small slds-m-bottom_x-small">{statusLabel}</h3>
                <p class="slds-text-body_small">
                    <template lwc:if={canSubmit}>
                        You have at least one match. You may proceed to submit.
                    </template>
                    <template lwc:else>
                        You need at least one match to proceed. Use the suggestions below to broaden your search.
                    </template>
                </p>
                <template lwc:if={showRecalculateButton}>
                    <p class="slds-m-top_x-small slds-text-body_small">
                        <lightning-button label="Recalculate" variant="neutral" onclick={handleRecalculate} title="Recalculate matches if you went back and changed your criteria"></lightning-button>
                    </p>
                </template>
            </div>
            <template lwc:if={showSuggestions}>
                <ul class="slds-list_dotted slds-m-top_small slds-p-left_medium">
                    <template for:each={suggestionList} for:item="item">
                        <li key={item.id}>{item.text}</li>
                    </template>
                </ul>
            </template>
            <template lwc:if={showZeroMatchFeedback}>
                <div class="slds-m-top_medium slds-p-around_small slds-box slds-box_x-small slds-theme_shade">
                    <h4 class="slds-text-heading_small slds-m-bottom_x-small">Why no matches?</h4>
                    <p class="slds-text-body_small slds-m-bottom_x-small"><strong>Criteria loaded:</strong> {zeroMatchFeedback.criteriaSummary}</p>
                    <p class="slds-text-body_small slds-m-bottom_x-small"><strong>Possible causes:</strong></p>
                    <ul class="slds-list_dotted slds-m-left_medium slds-m-bottom_x-small">
                        <template for:each={zeroMatchCauses} for:item="cause">
                            <li key={cause.id}>{cause.text}</li>
                        </template>
                    </ul>
                    <p class="slds-text-body_small slds-m-bottom_x-small"><strong>What to do:</strong></p>
                    <ul class="slds-list_dotted slds-m-left_medium">
                        <template for:each={zeroMatchSteps} for:item="step">
                            <li key={step.id}>{step.text}</li>
                        </template>
                    </ul>
                </div>
            </template>
        </template>
    </div>
</template>
